spring:
  application:
    name: zhike-backend
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/zhike?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
  
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  
  # Elasticsearch配置
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: changeme

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.zhike.entity
  configuration:
    map-underscore-to-camel-case: true

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# JWT配置
jwt:
  secret: zhike_secret_key_2026
  expiration: 86400 # 24小时
  refresh-expiration: 604800 # 7天

# 阿里云配置
alibaba:
  dashscope:
    api-key: your_api_key_here

# 视频配置
video:
  max-size: 524288000 # 500MB
  upload-path: /data/videos
  ffmpeg-path: /usr/bin/ffmpeg
